<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Academy — Gamified Interactive Tutorial</title>
<meta name="description" content="Master AI agents from zero to hero with OpenClaw Academy — an interactive gamified tutorial with 8 zones, 31 levels, challenges, badges, and real-world stories from practitioners.">
<meta property="og:title" content="OpenClaw Academy — Gamified Interactive Tutorial">
<meta property="og:description" content="Master AI agents from zero to hero — 8 zones, 31 levels, challenges, badges, and real-world stories. Learn OpenClaw the fun way.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0A0A0F">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0A0A0F;--bg2:#12121A;--bg3:#1A1A2E;--bg-hover:#22223A;
--text:#E8E8F0;--text2:#8888AA;--success:#39FF14;--error:#FF2D55;--locked:#444466;
--gold:#FFD700;
--z1:#00F0FF;--z2:#BF00FF;--z3:#39FF14;--z4:#FFD700;--z5:#FF1493;--z6:#FF6B00;--z7:#FF2D55;--z8:#0080FF;
--font-head:'Orbitron',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
--sidebar-w:260px;
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:var(--font-head);font-weight:700;letter-spacing:0.5px}
code,.mono{font-family:var(--font-mono)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:var(--text)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ===== TOP BAR ===== */
#topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg2);border-bottom:1px solid #ffffff10;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;backdrop-filter:blur(10px)}
#topbar .logo{font-family:var(--font-head);font-size:1.1rem;font-weight:900;display:flex;align-items:center;gap:8px}
#topbar .logo span{background:linear-gradient(135deg,var(--z1),var(--z2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.top-stats{display:flex;align-items:center;gap:16px;font-size:0.85rem}
.top-stats .stat{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:#ffffff08}
</style>
<style>
.xp-display{color:var(--gold);font-weight:700;font-family:var(--font-head);font-size:0.9rem;text-shadow:0 0 10px #FFD70060}
.rank-display{color:var(--z2);font-size:0.85rem}
#sound-toggle{font-size:1.2rem;padding:4px 8px;border-radius:8px;background:#ffffff08;cursor:pointer;transition:all .3s ease}
#sound-toggle:hover{background:#ffffff15}
#mobile-menu{display:none;font-size:1.4rem;padding:4px 8px;cursor:pointer}

/* ===== SIDEBAR ===== */
#sidebar{position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg3);border-right:1px solid #ffffff10;overflow-y:auto;z-index:90;transition:transform .3s ease}
.sidebar-section{padding:12px 16px}
.sidebar-section h3{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:8px}
.zone-item{padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .3s ease;margin-bottom:2px;font-size:0.9rem;display:flex;align-items:center;gap:8px}
.zone-item:hover{background:var(--bg-hover)}
.zone-item.active{background:#ffffff10}
.zone-item .zone-status{font-size:0.8rem}
.zone-item.locked{opacity:0.4;cursor:default}
.level-item{padding:6px 12px 6px 32px;border-radius:6px;cursor:pointer;transition:all .3s ease;font-size:0.85rem;display:flex;align-items:center;gap:6px;color:var(--text2)}
.level-item:hover:not(.locked){background:var(--bg-hover);color:var(--text)}
.level-item.active{color:var(--text);background:#ffffff10}
.level-item.completed{color:var(--success)}
.level-item.locked{opacity:0.35;cursor:default}
.zone-levels{max-height:0;overflow:hidden;transition:max-height .3s ease}
.zone-levels.open{max-height:500px}
.sidebar-nav{border-top:1px solid #ffffff10;padding:12px 16px}
.sidebar-nav button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;font-size:0.9rem;transition:all .3s ease}
.sidebar-nav button:hover{background:var(--bg-hover)}
.sidebar-nav button.active{background:#ffffff10}

/* ===== MAIN CONTENT ===== */
#main{margin-left:var(--sidebar-w);margin-top:56px;min-height:calc(100vh - 56px);padding:24px;transition:margin .3s ease}

/* ===== ZONE MAP ===== */
#zone-map{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1200px;margin:0 auto}
.map-header{grid-column:1/-1;text-align:center;padding:20px 0}
.map-header h1{font-size:1.8rem;margin-bottom:8px}
.map-header p{color:var(--text2);font-size:0.95rem}
.zone-card{background:var(--bg2);border:1px solid #ffffff10;border-radius:16px;padding:24px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.zone-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--zone-color);opacity:0.6;transition:opacity .3s ease}
.zone-card:hover{transform:translateY(-3px);border-color:#ffffff20}
.zone-card:hover::before{opacity:1}
.zone-card.completed{border-color:color-mix(in srgb,var(--zone-color) 40%,transparent)}
.zone-card.completed::before{opacity:1}
.zone-card.current{border-color:var(--zone-color);box-shadow:0 0 20px color-mix(in srgb,var(--zone-color) 20%,transparent),0 0 40px color-mix(in srgb,var(--zone-color) 10%,transparent);animation:pulse-glow 2s ease-in-out infinite}
.zone-card.locked{opacity:0.35;cursor:default;transform:none!important}
.zone-card .zone-emoji{font-size:2.5rem;margin-bottom:12px}
.zone-card .zone-name{font-family:var(--font-head);font-size:1.1rem;margin-bottom:4px}
.zone-card .zone-theme{color:var(--text2);font-size:0.85rem;margin-bottom:12px}
.zone-card .zone-progress{height:4px;background:#ffffff10;border-radius:2px;overflow:hidden}
.zone-card .zone-progress-fill{height:100%;border-radius:2px;transition:width .5s ease;background:var(--zone-color)}
.zone-card .zone-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:0.8rem;color:var(--text2)}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px color-mix(in srgb,var(--zone-color) 20%,transparent)}50%{box-shadow:0 0 30px color-mix(in srgb,var(--zone-color) 35%,transparent),0 0 60px color-mix(in srgb,var(--zone-color) 15%,transparent)}}
</style>
<style>
/* ===== LEVEL VIEW ===== */
#level-view{max-width:800px;margin:0 auto;display:none}
.level-header{margin-bottom:24px}
.level-header .level-num{font-size:0.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.level-header h1{font-size:1.6rem;margin:4px 0 8px}
.level-header .level-xp{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:#FFD70015;color:var(--gold);font-size:0.85rem;font-weight:600}
.content-card{background:var(--bg2);border:1px solid #ffffff10;border-radius:12px;padding:20px;margin-bottom:16px;transition:all .3s ease}
.content-card h2{font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.content-card p{line-height:1.7;color:var(--text);font-size:0.95rem}
.takeaway-box{background:linear-gradient(135deg,#ffffff05,#ffffff02);border-left:3px solid var(--zone-color,var(--z1));padding:16px 20px;border-radius:0 12px 12px 0;margin-bottom:16px}
.takeaway-box p{font-weight:500;font-size:0.95rem}
.story-card{border:1px solid #FFD70030;border-radius:12px;padding:16px 20px;margin-bottom:16px;background:#FFD70005;cursor:pointer;transition:all .3s ease}
.story-card:hover{background:#FFD70010;border-color:#FFD70050}
.story-card.locked{opacity:0.4;cursor:default;border-color:var(--locked)}
.story-card .story-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-weight:600}
.story-card .story-who{font-size:0.8rem;color:var(--text2);margin-bottom:8px}
.story-card .story-body{display:none;line-height:1.7;font-size:0.95rem}
.story-card .story-body.open{display:block}
.story-card .story-lesson{font-style:italic;color:var(--gold);margin-top:8px;font-size:0.9rem}

/* ===== CHALLENGE AREA ===== */
.challenge-area{background:var(--bg2);border:1px solid #ffffff10;border-radius:12px;padding:24px;margin-bottom:16px}
.challenge-area h2{font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.challenge-area .question{font-size:1rem;margin-bottom:16px;line-height:1.6}
.mc-options{display:flex;flex-direction:column;gap:8px}
.mc-option{padding:12px 16px;border:1px solid #ffffff15;border-radius:10px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:10px;font-size:0.95rem}
.mc-option:hover{background:#ffffff08;border-color:#ffffff25}
.mc-option.selected{border-color:var(--z1);background:#00F0FF10}
.mc-option.correct{border-color:var(--success);background:#39FF1415;color:var(--success)}
.mc-option.wrong{border-color:var(--error);background:#FF2D5515;color:var(--error)}
.mc-option .radio{width:18px;height:18px;border:2px solid #ffffff30;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.mc-option.selected .radio{border-color:var(--z1)}
.mc-option.selected .radio::after{content:'';width:8px;height:8px;background:var(--z1);border-radius:50%}
.mc-option.correct .radio{border-color:var(--success)}
.mc-option.correct .radio::after{content:'✓';background:none;color:var(--success);font-size:12px;width:auto;height:auto}
.mc-option.wrong .radio{border-color:var(--error)}
.mc-option.wrong .radio::after{content:'✗';background:none;color:var(--error);font-size:12px;width:auto;height:auto}

/* Drag & Drop */
.dd-container{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dd-items,.dd-targets{display:flex;flex-direction:column;gap:8px}
.dd-item{padding:10px 14px;background:var(--bg3);border:1px solid #ffffff15;border-radius:8px;cursor:grab;transition:all .2s ease;font-size:0.9rem;user-select:none}
.dd-item:active{cursor:grabbing;transform:scale(1.02)}
.dd-item.dragging{opacity:0.5}
.dd-item.matched{border-color:var(--success);background:#39FF1410;cursor:default}
.dd-target{padding:10px 14px;background:#ffffff05;border:2px dashed #ffffff20;border-radius:8px;min-height:42px;transition:all .2s ease;font-size:0.9rem}
.dd-target.over{border-color:var(--z1);background:#00F0FF08}
.dd-target.filled{border-style:solid;border-color:var(--success);background:#39FF1408}
.dd-target.wrong-fill{border-color:var(--error);background:#FF2D5508}
.dd-label{font-size:0.8rem;color:var(--text2);margin-bottom:4px}

/* Ordering */
.order-list{display:flex;flex-direction:column;gap:6px}
.order-item{padding:12px 16px;background:var(--bg3);border:1px solid #ffffff15;border-radius:8px;cursor:grab;display:flex;align-items:center;gap:10px;transition:all .2s ease;font-size:0.9rem;user-select:none}
.order-item:active{cursor:grabbing}
.order-item .grip{color:var(--text2);font-size:1.1rem}
.order-item.correct-pos{border-color:var(--success);background:#39FF1410}
.order-item.wrong-pos{border-color:var(--error);background:#FF2D5510}

/* Fill in blank */
.fill-blank-input{background:var(--bg3);border:1px solid #ffffff20;border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font-mono);font-size:0.95rem;width:100%;max-width:400px;transition:all .3s ease;outline:none}
.fill-blank-input:focus{border-color:var(--z1);box-shadow:0 0 10px #00F0FF20}
.fill-blank-input.correct{border-color:var(--success);box-shadow:0 0 10px #39FF1420}
.fill-blank-input.wrong{border-color:var(--error);box-shadow:0 0 10px #FF2D5520}
.fill-group{margin-bottom:12px}
.fill-group label{display:block;margin-bottom:6px;font-size:0.9rem;color:var(--text2)}

/* True/False */
.tf-question{padding:16px;background:var(--bg3);border:1px solid #ffffff10;border-radius:10px;margin-bottom:8px;transition:all .3s ease}
.tf-question .tf-text{margin-bottom:10px;font-size:0.95rem}
.tf-buttons{display:flex;gap:8px}
.tf-btn{padding:8px 20px;border-radius:8px;font-weight:600;transition:all .3s ease;font-size:0.9rem}
.tf-btn.true-btn{border:1px solid var(--success);color:var(--success)}
.tf-btn.true-btn:hover{background:#39FF1415}
.tf-btn.false-btn{border:1px solid var(--error);color:var(--error)}
.tf-btn.false-btn:hover{background:#FF2D5515}
.tf-btn.chosen-correct{background:var(--success);color:#000}
.tf-btn.chosen-wrong{background:var(--error);color:#fff}
.tf-question.answered{opacity:0.7}

/* Checklist */
.checklist-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid #ffffff10;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .3s ease;font-size:0.9rem}
.checklist-item:hover{background:var(--bg-hover)}
.checklist-item input[type=checkbox]{accent-color:var(--z1);width:18px;height:18px}
.checklist-item.checked{border-color:var(--success);background:#39FF1408}

/* Creative */
.creative-textarea{width:100%;min-height:80px;background:var(--bg3);border:1px solid #ffffff20;border-radius:8px;padding:12px;color:var(--text);font-family:var(--font-body);font-size:0.95rem;resize:vertical;outline:none;transition:all .3s ease}
.creative-textarea:focus{border-color:var(--z1);box-shadow:0 0 10px #00F0FF20}

/* Submit / Nav buttons */
.challenge-submit{padding:10px 24px;border-radius:10px;font-weight:600;font-size:0.95rem;transition:all .3s ease;margin-top:16px}
.btn-primary{background:linear-gradient(135deg,var(--zone-color,var(--z1)),color-mix(in srgb,var(--zone-color,var(--z1)) 70%,#fff));color:#000;border:none}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px color-mix(in srgb,var(--zone-color,var(--z1)) 40%,transparent)}
.btn-primary:disabled{opacity:0.4;cursor:default;transform:none;box-shadow:none}
.btn-outline{border:1px solid #ffffff20;background:#ffffff08}
.btn-outline:hover{background:#ffffff15}
.level-nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.level-nav button{padding:10px 20px;border-radius:10px;font-size:0.9rem;transition:all .3s ease}
.challenge-result{padding:12px 16px;border-radius:10px;margin-top:12px;font-weight:500;font-size:0.95rem;display:none}
.challenge-result.success{display:block;background:#39FF1412;border:1px solid #39FF1430;color:var(--success)}
.challenge-result.fail{display:block;background:#FF2D5512;border:1px solid #FF2D5530;color:var(--error)}
</style>
<style>
/* ===== TROPHY CASE ===== */
#trophy-view{display:none;max-width:900px;margin:0 auto}
.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:16px}
.badge-card{background:var(--bg2);border:1px solid #ffffff10;border-radius:12px;padding:20px;text-align:center;transition:all .3s ease;cursor:default}
.badge-card:hover{transform:translateY(-2px)}
.badge-card .badge-icon{font-size:2.5rem;margin-bottom:8px;display:block}
.badge-card .badge-name{font-family:var(--font-head);font-size:0.75rem;margin-bottom:4px}
.badge-card .badge-desc{font-size:0.75rem;color:var(--text2)}
.badge-card.earned{border-color:#FFD70040;box-shadow:0 0 15px #FFD70015}
.badge-card.earned .badge-icon{filter:none}
.badge-card.locked{opacity:0.35}
.badge-card.locked .badge-icon{filter:grayscale(1)}

/* ===== STATS VIEW ===== */
#stats-view{display:none;max-width:700px;margin:0 auto}
.stat-card{background:var(--bg2);border:1px solid #ffffff10;border-radius:12px;padding:20px;margin-bottom:12px}
.stat-card h3{font-size:0.9rem;color:var(--text2);margin-bottom:8px}
.stat-card .stat-value{font-family:var(--font-head);font-size:1.8rem;color:var(--gold)}
.stat-bar{height:8px;background:#ffffff10;border-radius:4px;overflow:hidden;margin-top:8px}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.reset-btn{margin-top:24px;padding:10px 20px;border:1px solid var(--error);color:var(--error);border-radius:10px;font-size:0.9rem;transition:all .3s ease}
.reset-btn:hover{background:#FF2D5515}

/* ===== STORIES VIEW ===== */
#stories-view{display:none;max-width:800px;margin:0 auto}
.stories-list{display:flex;flex-direction:column;gap:12px;margin-top:16px}

/* ===== GRADUATION ===== */
#grad-view{display:none;text-align:center;max-width:700px;margin:0 auto;padding:40px 20px}
#grad-view .grad-badge{font-size:5rem;margin-bottom:16px;display:block;animation:grad-float 3s ease-in-out infinite}
#grad-view h1{font-size:2rem;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
#grad-view p{color:var(--text2);line-height:1.7;margin-bottom:16px}
.grad-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.grad-stat{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid #FFD70020}
.grad-stat .val{font-family:var(--font-head);font-size:1.5rem;color:var(--gold)}
.grad-stat .lbl{font-size:0.8rem;color:var(--text2);margin-top:4px}
.grad-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
.grad-links a{padding:10px 20px;border:1px solid #FFD70040;border-radius:10px;color:var(--gold);transition:all .3s ease;font-size:0.9rem}
.grad-links a:hover{background:#FFD70015}
@keyframes grad-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ===== XP ANIMATION ===== */
.xp-float{position:fixed;pointer-events:none;font-family:var(--font-head);font-weight:700;color:var(--gold);font-size:1.2rem;text-shadow:0 0 10px #FFD70060;z-index:200;animation:xp-rise 1.5s ease-out forwards}
@keyframes xp-rise{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

/* ===== BADGE CELEBRATION ===== */
#badge-celebration{display:none;position:fixed;inset:0;background:#000000cc;z-index:300;align-items:center;justify-content:center;flex-direction:column}
#badge-celebration.show{display:flex}
#badge-celebration .celeb-badge{font-size:5rem;animation:badge-pop 0.6s ease-out}
#badge-celebration .celeb-name{font-family:var(--font-head);font-size:1.3rem;margin-top:12px;color:var(--gold)}
#badge-celebration .celeb-desc{color:var(--text2);margin-top:8px;font-size:0.9rem}
#badge-celebration .celeb-close{margin-top:20px;padding:8px 24px;border:1px solid #ffffff20;border-radius:8px;font-size:0.9rem;transition:all .3s ease}
#badge-celebration .celeb-close:hover{background:#ffffff10}
@keyframes badge-pop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0)}}

/* ===== CONFETTI CANVAS ===== */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:250}

/* ===== MOBILE ===== */
#mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid #ffffff10;z-index:100;justify-content:space-around;align-items:center}
#mobile-tabs button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:0.65rem;color:var(--text2);padding:4px 8px;transition:all .3s ease}
#mobile-tabs button.active{color:var(--text)}
#mobile-tabs button .tab-icon{font-size:1.2rem}

@media(max-width:1024px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #mobile-menu{display:block}
}
@media(max-width:768px){
  #sidebar{display:none}
  #mobile-menu{display:none}
  #mobile-tabs{display:flex}
  #main{margin-left:0;margin-bottom:56px;padding:16px}
  .top-stats .stat.hide-mobile{display:none}
  .dd-container{grid-template-columns:1fr}
  .trophy-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .grad-stats{grid-template-columns:1fr}
}

/* ===== ARIA LIVE ===== */

     explanation:"This is THE core concept of OpenClaw — and arguably all AI agents. A chatbot is one turn: you ask, it answers, done. An agent is a loop. It gets a task, picks a tool, reads the result, decides what to do next, and keeps going until the job is done.\n\nJay explains it perfectly: \"Like fixing a bug: read the file, find the error, edit the code, run the test, and if it fails, try again.\" The loop is what transforms a language model from a question-answering machine into an autonomous worker. Everything else in OpenClaw — memory, tools, skills — builds on top of this fundamental loop.",

     explanation:"The gateway is the always-on engine — think of it as a receptionist at a building. It's always there, always running. Messages come in from different channels (WhatsApp, Telegram, etc.), and the gateway routes them to the right agent.\n\nIt includes a web interface called the Control UI where you can manage your agents, view conversations, and configure settings. A single gateway can host many independent agents — Bhanu runs his entire agent army through one gateway. No need for one server per agent.",

{

     explanation:"The context window is how much the agent can hold in its head at once. Opus 4.6 can hold about a million tokens — that's roughly the length of the Bible. When it gets full, the context engine compresses older stuff, keeping the important bits.\n\nBut bigger isn't always better. When Bhanu was using one agent for everything — personal life, business, coding, marketing — the context got muddled and the agent forgot things. That's context window overflow in practice. Solution: specialist agents with focused contexts.",

     story:{id:"story-14",title:"Context Got Muddled — Time for Specialists",who:"Bhanu",
       content:"When Bhanu was using one agent for everything — personal life, business, coding, marketing — the context got muddled and the agent forgot things. That's context window overflow in practice. The solution was specialist agents, each with a focused context that stays clean and relevant.",

     story:null,

     explanation:"OpenClaw is like a cockpit where you can swap engines mid-flight. Claude for deep thinking, GPT for speed, local models via Ollama for privacy. You're never locked to one provider.\n\nBhanu initially assigned different LLMs to different agents but switched to Opus everywhere because agent-to-agent communication quality matters. The framework lets you experiment — that flexibility is the point. Match the model to the task, and switch whenever you want.",

function loadState(){
  try{
    const s = localStorage.getItem('openclaw_state');
    if(s){ const p=JSON.parse(s); Object.assign(state,p); }
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem('openclaw_state',JSON.stringify(state)); }catch(e){}
}
function resetState(){
  if(!confirm('Reset ALL progress? This cannot be undone.')) return;
  state={xp:0,completedLevels:[],badges:[],storiesUnlocked:[],quizResults:{},currentZone:1,currentLevel:null,streak:0,maxStreak:0,soundOn:state.soundOn,startTime:Date.now(),speedBonuses:0,levelStartTime:null};

}

// ===== SOUND ENGINE =====
let audioCtx = null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(type){
  if(!state.soundOn) return;
  try{
    const ctx=getAudioCtx(), now=ctx.currentTime;
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='xp'){osc.frequency.setValueAtTime(880,now);osc.frequency.exponentialRampToValueAtTime(1760,now+0.1);gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.2);osc.start(now);osc.stop(now+0.2);}
    else if(type==='success'){osc.frequency.setValueAtTime(523,now);osc.frequency.setValueAtTime(659,now+0.1);osc.frequency.setValueAtTime(784,now+0.2);gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.4);osc.start(now);osc.stop(now+0.4);}
    else if(type==='badge'){osc.frequency.setValueAtTime(440,now);osc.frequency.setValueAtTime(554,now+0.15);osc.frequency.setValueAtTime(659,now+0.3);osc.frequency.setValueAtTime(880,now+0.45);gain.gain.setValueAtTime(0.2,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.7);osc.start(now);osc.stop(now+0.7);}
    else if(type==='wrong'){osc.type='sawtooth';osc.frequency.setValueAtTime(200,now);osc.frequency.exponentialRampToValueAtTime(100,now+0.2);gain.gain.setValueAtTime(0.1,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);osc.start(now);osc.stop(now+0.3);}
    else if(type==='zone'){osc.frequency.setValueAtTime(440,now);osc.frequency.setValueAtTime(554,now+0.1);osc.frequency.setValueAtTime(659,now+0.2);osc.frequency.setValueAtTime(880,now+0.3);osc.frequency.setValueAtTime(1047,now+0.4);gain.gain.setValueAtTime(0.2,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.8);osc.start(now);osc.stop(now+0.8);}
  }catch(e){}
}

// ===== HELPERS =====
function getRank(){
  let r=RANKS[0];
  for(const rank of RANKS){ if(state.xp>=rank.xp) r=rank; }
  return r;
}
function getNextRank(){
  for(let i=0;i<RANKS.length;i++){ if(state.xp<RANKS[i].xp) return RANKS[i]; }
  return null;
}
function isLevelCompleted(id){ return state.completedLevels.includes(id); }
function isZoneCompleted(zoneId){
  const z=ZONES.find(z=>z.id===zoneId);
  return z && z.levels.every(l=>isLevelCompleted(l.id));
}
function isZoneUnlocked(zoneId){
  if(zoneId===1) return true;
  return isZoneCompleted(zoneId-1);
}
function isLevelUnlocked(levelId){
  const parts=levelId.split('.');
  const zoneId=parseInt(parts[0]);
  const levelNum=parseInt(parts[1]);
  if(!isZoneUnlocked(zoneId)) return false;
  if(levelNum===1) return true;
  const prevId=zoneId+'.'+(levelNum-1);
  return isLevelCompleted(prevId);
}
function getZoneColor(zoneId){
  const z=ZONES.find(z=>z.id===zoneId);
  return z?z.color:'#00F0FF';
}
function getZoneForLevel(levelId){
  return ZONES.find(z=>z.levels.some(l=>l.id===levelId));
}
function announce(msg){
  const el=document.getElementById('aria-live');
  el.textContent=msg;
  setTimeout(()=>el.textContent='',3000);
}

// ===== XP SYSTEM =====
function awardXP(amount, sourceEl){
  state.xp+=amount;
  playSound('xp');
  updateTopBar();
  saveState();
  // Float animation
  const float=document.createElement('div');
  float.className='xp-float';
  float.textContent='+'+amount+' XP';
  if(sourceEl){
    const r=sourceEl.getBoundingClientRect();
    float.style.left=r.left+'px';
    float.style.top=r.top+'px';
  } else {
    float.style.right='80px';
    float.style.top='60px';
  }
  document.body.appendChild(float);
  setTimeout(()=>float.remove(),1500);
  announce('+'+amount+' XP earned!');
}

function completeLevel(levelId){
  if(isLevelCompleted(levelId)) return;
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  state.completedLevels.push(levelId);
  state.streak++;
  if(state.streak>state.maxStreak) state.maxStreak=state.streak;

  // Speed bonus
  if(state.levelStartTime && (Date.now()-state.levelStartTime)<120000){
    state.speedBonuses++;
    awardXP(25);
  }
  // Streak bonus
  if(state.streak>0 && state.streak%3===0) awardXP(75);

  // Level XP
  awardXP(level.xp, document.querySelector('.challenge-submit'));

  // Story unlock
  if(level.story && !state.storiesUnlocked.includes(level.story.id)){
    state.storiesUnlocked.push(level.story.id);
    awardXP(25);
  }

  // Zone completion check
  if(isZoneCompleted(zone.id)){
    awardXP(zone.bonusXP);
    playSound('zone');
    if(!state.badges.includes(zone.badge.id)){
      state.badges.push(zone.badge.id);
      setTimeout(()=>showBadgeCelebration(zone.badge),500);
    }
  }

  // Check special badges
  checkSpecialBadges();

  // Graduation check
  if(state.completedLevels.length>=31 && !state.badges.includes('openclaw-master')){
    state.badges.push('openclaw-master');
    setTimeout(()=>{showBadgeCelebration({id:'openclaw-master',name:'OpenClaw Master',icon:'👑',desc:'Completed the entire academy!'});awardXP(1000);},1000);
  }

  saveState();
  updateTopBar();
  renderSidebar();
}

function checkSpecialBadges(){
  SPECIAL_BADGES.forEach(b=>{
    if(!state.badges.includes(b.id) && b.condition(state.completedLevels,state)){
      state.badges.push(b.id);
      setTimeout(()=>showBadgeCelebration(b),800);
    }
  });
}

// ===== UI RENDERING =====
function updateTopBar(){
  const rank=getRank();
  document.getElementById('top-rank').textContent=rank.icon+' '+rank.title;
  document.getElementById('top-xp').textContent='⭐ '+state.xp.toLocaleString()+' XP';
  document.getElementById('top-badges').textContent='🏆 '+state.badges.length+'/20';
  const pct=Math.round((state.completedLevels.length/31)*100);
  document.getElementById('top-progress').textContent='📊 '+pct+'%';
}

function renderSidebar(){
  const container=document.getElementById('sidebar-zones');
  let html='<h3>Zones</h3>';
  ZONES.forEach(z=>{
    const unlocked=isZoneUnlocked(z.id);
    const completed=isZoneCompleted(z.id);
    const isCurrent=unlocked&&!completed;
    const cls=completed?'completed':(isCurrent?'active':(unlocked?'':'locked'));
    const status=completed?'✅':(isCurrent?'▶️':(unlocked?'🔓':'🔒'));
    html+=`<div class="zone-item ${cls}" onclick="${unlocked?`toggleZoneLevels(${z.id})`:''}">
      <span>${z.emoji}</span><span style="flex:1">${z.name}</span><span class="zone-status">${status}</span>
    </div>
    <div class="zone-levels" id="zone-levels-${z.id}">`;
    z.levels.forEach(l=>{
      const lUnlocked=isLevelUnlocked(l.id);
      const lCompleted=isLevelCompleted(l.id);
      const lCurrent=lUnlocked&&!lCompleted;
      const lCls=lCompleted?'completed':(lCurrent?'active':(lUnlocked?'':'locked'));
      const lStatus=lCompleted?'✅':(lCurrent?'▶️':'🔒');
      html+=`<div class="level-item ${lCls}" onclick="${lUnlocked?`openLevel('${l.id}')`:''}">
        <span>${lStatus}</span><span>${l.emoji} ${l.title}</span>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function toggleZoneLevels(zoneId){
  const el=document.getElementById('zone-levels-'+zoneId);
  el.classList.toggle('open');
}

// ===== ZONE MAP =====
function renderZoneMap(){
  let html=`<div class="map-header">
    <h1>🎮 OpenClaw Academy</h1>
    <p>Master AI agents from zero to hero — 8 zones, 31 levels, one epic journey</p>
  </div>`;
  ZONES.forEach(z=>{
    const unlocked=isZoneUnlocked(z.id);
    const completed=isZoneCompleted(z.id);
    const isCurrent=unlocked&&!completed;
    const cls=completed?'completed':(isCurrent?'current':(unlocked?'':'locked'));
    const completedCount=z.levels.filter(l=>isLevelCompleted(l.id)).length;
    const pct=Math.round((completedCount/z.levels.length)*100);
    html+=`<div class="zone-card ${cls}" style="--zone-color:${z.color}" onclick="${unlocked?`expandZone(${z.id})`:''}">
      <div class="zone-emoji">${z.emoji}</div>
      <div class="zone-name" style="color:${unlocked?z.color:'var(--locked)'}">${z.name}</div>
      <div class="zone-theme">${z.theme}</div>
      <div class="zone-progress"><div class="zone-progress-fill" style="width:${pct}%;background:${z.color}"></div></div>
      <div class="zone-meta"><span>${completedCount}/${z.levels.length} levels</span><span>${unlocked?(completed?'✅ Complete':'▶️ In Progress'):'🔒 Locked'}</span></div>
    </div>`;
  });
  // Graduation card
  const allDone=ZONES.every(z=>isZoneCompleted(z.id));
  html+=`<div class="zone-card ${allDone?'completed':'locked'}" style="--zone-color:#FFD700" onclick="${allDone?`showView('graduation')`:''}">
    <div class="zone-emoji">🎓</div>
    <div class="zone-name" style="color:${allDone?'#FFD700':'var(--locked)'}">Graduation</div>
    <div class="zone-theme">Complete all zones to graduate</div>
    <div class="zone-meta"><span>Final Ceremony</span><span>${allDone?'🎓 Ready':'🔒 Locked'}</span></div>
  </div>`;
  document.getElementById('zone-map').innerHTML=html;
}

function expandZone(zoneId){
  const el=document.getElementById('zone-levels-'+zoneId);
  // Open sidebar levels
  document.querySelectorAll('.zone-levels').forEach(e=>e.classList.remove('open'));
  if(el) el.classList.add('open');
  // Find first incomplete level
  const z=ZONES.find(z=>z.id===zoneId);
  const nextLevel=z.levels.find(l=>!isLevelCompleted(l.id)&&isLevelUnlocked(l.id));
  if(nextLevel) openLevel(nextLevel.id);
  else if(z.levels.length) openLevel(z.levels[0].id);
}

// ===== LEVEL VIEW =====
function openLevel(levelId){
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  if(!level||!isLevelUnlocked(levelId)) return;
  state.currentLevel=levelId;
  state.levelStartTime=Date.now();
  // Reset challenge state for fresh start
  selectedMC=-1;
  tfScore=0;tfAnswered=0;tfTotal=0;
  saveState();
  showView('level');
  const completed=isLevelCompleted(levelId);
  const color=zone.color;
  let html=`<div class="level-header">
    <div class="level-num" style="color:${color}">Zone ${zone.id}: ${zone.name} — Level ${level.id}</div>
    <h1>${level.emoji} ${level.title}</h1>
    <span class="level-xp">⭐ ${level.xp} XP</span>
    ${completed?'<span style="margin-left:8px;color:var(--success);font-size:0.85rem">✅ Completed</span>':''}
  </div>`;

  // Explanation
  html+=`<div class="content-card"><h2>📖 What Is It?</h2>`;
  level.explanation.split('\n\n').forEach(p=>{
    html+=`<p style="margin-bottom:12px">${p}</p>`;
  });
  html+=`</div>`;

  // Key Takeaway
  html+=`<div class="takeaway-box" style="--zone-color:${color};border-left-color:${color}">
    <h2 style="font-size:0.9rem;margin-bottom:6px;color:${color}">💡 Key Takeaway</h2>
    <p>${level.keyTakeaway}</p>
  </div>`;

  // Story
  if(level.story){
    const unlocked=state.storiesUnlocked.includes(level.story.id)||completed;
    if(unlocked){
      html+=`<div class="story-card" onclick="this.querySelector('.story-body').classList.toggle('open')">
        <div class="story-header">📖 <span style="color:var(--gold)">${level.story.title}</span></div>
        <div class="story-who">👤 ${level.story.who}'s Story</div>
        <div class="story-body"><p>${level.story.content}</p>
        <p class="story-lesson">💡 ${level.story.lesson}</p></div>
      </div>`;
    } else {
      html+=`<div class="story-card locked">
        <div class="story-header">🔒 <span>Complete this level to unlock the story</span></div>
      </div>`;
    }
  }

  // Challenge
  if(!completed){
    html+=renderChallenge(level, zone);
  } else {
    html+=`<div class="content-card" style="border-color:var(--success);background:#39FF1408">
      <h2>✅ Challenge Completed</h2>
      <p style="color:var(--text2)">You've already completed this level's challenge. Great work!</p>
    </div>`;
  }

  // Navigation
  const allLevels=[];
  ZONES.forEach(z=>z.levels.forEach(l=>allLevels.push(l.id)));
  const idx=allLevels.indexOf(levelId);
  html+=`<div class="level-nav">`;
  if(idx>0){
    const prev=allLevels[idx-1];
    html+=`<button class="btn-outline" onclick="openLevel('${prev}')">← Previous</button>`;
  } else html+=`<span></span>`;
  if(idx<allLevels.length-1 && completed){
    const next=allLevels[idx+1];
    if(isLevelUnlocked(next)){
      html+=`<button class="btn-primary" style="--zone-color:${color}" onclick="openLevel('${next}')">Next Level →</button>`;
    }
  }
  html+=`</div>`;

  document.getElementById('level-view').innerHTML=html;
  document.getElementById('level-view').scrollTop=0;
  window.scrollTo(0,0);
  renderSidebar();
}

// ===== CHALLENGE RENDERER =====
function renderChallenge(level, zone){
  const c=level.challenge;
  const color=zone.color;
  let html=`<div class="challenge-area" style="--zone-color:${color}" id="challenge-area">
    <h2>🎯 Challenge</h2>
    <div class="question">${c.question}</div>`;

  switch(c.type){
    case 'multiple-choice':
      html+=renderMC(c, level.id, color);
      break;
    case 'drag-match':
      html+=renderDragMatch(c, level.id, color);
      break;
    case 'ordering':
      html+=renderOrdering(c, level.id, color);
      break;
    case 'fill-blank':
      html+=renderFillBlank(c, level.id, color);
      break;
    case 'true-false':
      html+=renderTrueFalse(c, level.id, color);
      break;
    case 'creative':
      html+=renderCreative(c, level.id, color);
      break;
    case 'checklist':
      html+=renderChecklist(c, level.id, color);
      break;
  }

  html+=`<div class="challenge-result" id="challenge-result"></div></div>`;
  return html;
}

// Multiple Choice
function renderMC(c, levelId, color){
  let html=`<div class="mc-options" id="mc-options" role="radiogroup">`;
  c.options.forEach((opt,i)=>{
    html+=`<div class="mc-option" data-idx="${i}" onclick="selectMC(this,${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectMC(this,${i})}" tabindex="0" role="radio" aria-checked="false">
      <div class="radio"></div><span>${opt}</span>
    </div>`;
  });
  html+=`</div>
  <button class="challenge-submit btn-primary" style="--zone-color:${color}" onclick="submitMC('${levelId}',${c.correct})" id="mc-submit">Submit Answer</button>`;
  return html;
}
let selectedMC=-1;
function selectMC(el,idx){
  if(el.closest('.challenge-area').querySelector('.mc-option.correct')) return;
  selectedMC=idx;
  el.closest('.mc-options').querySelectorAll('.mc-option').forEach(o=>{o.classList.remove('selected');o.setAttribute('aria-checked','false');});
  el.classList.add('selected');
  el.setAttribute('aria-checked','true');
}
function submitMC(levelId,correctIdx){
  if(selectedMC<0) return;
  const options=document.querySelectorAll('#mc-options .mc-option');
  const result=document.getElementById('challenge-result');
  options.forEach(o=>{
    const idx=parseInt(o.dataset.idx);
    if(idx===correctIdx) o.classList.add('correct');
    else if(idx===selectedMC) o.classList.add('wrong');
    o.style.pointerEvents='none';
  });
  if(selectedMC===correctIdx){
    result.className='challenge-result success';
    result.textContent='🎉 Correct! Well done!';
    playSound('success');
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:true,perfect:true,attempts:1};
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),800);
  } else {
    result.className='challenge-result fail';
    result.textContent='❌ Not quite. The correct answer is highlighted in green.';
    playSound('wrong');
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:true,perfect:false,attempts:1};
    else state.quizResults[levelId].attempts++;
    // Still complete on wrong answer
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),1200);
  }
  saveState();
  selectedMC=-1;
}

// Drag & Drop Matching
function renderDragMatch(c, levelId, color){
  const shuffled=[...c.pairs].sort(()=>Math.random()-0.5);
  const targets=[...new Set(c.pairs.map(p=>p.target))].sort(()=>Math.random()-0.5);
  let html=`<div class="dd-container" id="dd-container" data-level="${levelId}" data-total="${targets.length}">
    <div><div class="dd-label">Drag these items:</div><div class="dd-items" id="dd-items">`;
  // Collect unique items
  const items=[...new Set(c.pairs.map(p=>p.item))].sort(()=>Math.random()-0.5);
  items.forEach((item,i)=>{
    html+=`<div class="dd-item" draggable="true" data-item="${item}" id="dd-item-${i}"
      ondragstart="ddStart(event)" ondragend="ddEnd(event)">${item}</div>`;
  });
  html+=`</div></div><div><div class="dd-label">Drop onto targets:</div><div class="dd-targets" id="dd-targets">`;
  targets.forEach((t,i)=>{
    html+=`<div class="dd-target" data-target="${t}" id="dd-target-${i}"
      ondragover="ddOver(event)" ondragleave="ddLeave(event)" ondrop="ddDrop(event)">${t}</div>`;
  });
  html+=`</div></div></div>
  <button class="challenge-submit btn-primary" style="--zone-color:${color}" onclick="submitDD('${levelId}')" id="dd-submit">Check Matches</button>`;
  return html;
}
let ddData='';
function ddStart(e){e.dataTransfer.setData('text',e.target.dataset.item);ddData=e.target.dataset.item;e.target.classList.add('dragging');}
function ddEnd(e){e.target.classList.remove('dragging');}
function ddOver(e){e.preventDefault();e.currentTarget.classList.add('over');}
function ddLeave(e){e.currentTarget.classList.remove('over');}
function ddDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  const item=e.dataTransfer.getData('text');
  e.currentTarget.dataset.dropped=item;
  e.currentTarget.innerHTML=`<strong>${item}</strong> → ${e.currentTarget.dataset.target}`;
  e.currentTarget.classList.add('filled');
}
function submitDD(levelId){
  const container=document.getElementById('dd-container');
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  const pairs=level.challenge.pairs;
  const targets=document.querySelectorAll('#dd-targets .dd-target');
  let correct=0, total=targets.length;
  // Build lookup: target -> valid items
  const lookup={};
  pairs.forEach(p=>{if(!lookup[p.target])lookup[p.target]=[];lookup[p.target].push(p.item);});
  targets.forEach(t=>{
    const dropped=t.dataset.dropped;
    const target=t.dataset.target;
    if(dropped && lookup[target] && lookup[target].includes(dropped)){
      t.classList.add('filled');t.classList.remove('wrong-fill');correct++;
    } else if(dropped){
      t.classList.add('wrong-fill');t.classList.remove('filled');
    }
  });
  const result=document.getElementById('challenge-result');
  if(correct>=Math.ceil(total*0.6)){
    result.className='challenge-result success';
    result.textContent=`🎉 ${correct}/${total} correct! Great matching!`;
    playSound('success');
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:true,perfect:correct===total,attempts:1};
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),800);
  } else {
    result.className='challenge-result fail';
    result.textContent=`❌ ${correct}/${total} correct. Try dragging items to different targets.`;
    playSound('wrong');
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:false,perfect:false,attempts:1};
    else state.quizResults[levelId].attempts++;
    // Complete anyway after attempt
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),1200);
  }
  saveState();
}

// Ordering
function renderOrdering(c, levelId, color){
  const shuffled=c.items.map((item,i)=>({text:item,origIdx:i})).sort(()=>Math.random()-0.5);
  let html=`<div class="order-list" id="order-list" data-level="${levelId}">`;
  shuffled.forEach((item,i)=>{
    html+=`<div class="order-item" draggable="true" data-orig="${item.origIdx}"
      ondragstart="orderDragStart(event,${i})" ondragover="orderDragOver(event)" ondrop="orderDrop(event,${i})">
      <span class="grip">⠿</span><span>${item.text}</span>
    </div>`;
  });
  html+=`</div>
  <button class="challenge-submit btn-primary" style="--zone-color:${color}" onclick="submitOrder('${levelId}')" id="order-submit">Check Order</button>`;
  return html;
}
let orderDragIdx=-1;
function orderDragStart(e,idx){orderDragIdx=idx;e.dataTransfer.effectAllowed='move';}
function orderDragOver(e){e.preventDefault();}
function orderDrop(e,dropIdx){
  e.preventDefault();
  const list=document.getElementById('order-list');
  const items=[...list.children];
  if(orderDragIdx<0||orderDragIdx===dropIdx) return;
  const dragEl=items[orderDragIdx];
  const dropEl=items[dropIdx];
  if(orderDragIdx<dropIdx) list.insertBefore(dragEl,dropEl.nextSibling);
  else list.insertBefore(dragEl,dropEl);
  orderDragIdx=-1;
}
function submitOrder(levelId){
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  const list=document.getElementById('order-list');
  const items=[...list.children];
  let correct=0;
  items.forEach((el,i)=>{
    const orig=parseInt(el.dataset.orig);
    if(orig===level.challenge.correctOrder[i]){
      el.classList.add('correct-pos');correct++;
    } else {
      el.classList.add('wrong-pos');
    }
  });
  const result=document.getElementById('challenge-result');
  const total=items.length;
  if(correct>=Math.ceil(total*0.8)){
    result.className='challenge-result success';
    result.textContent=`🎉 ${correct}/${total} in correct position! Great sequencing!`;
    playSound('success');
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:true,perfect:correct===total,attempts:1};
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),800);
  } else {
    result.className='challenge-result fail';
    result.textContent=`❌ ${correct}/${total} correct. Green = right position, red = wrong.`;
    playSound('wrong');
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),1200);
  }
  saveState();
}

function submitFill(levelId){
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  const blanks=level.challenge.blanks;
  let correct=0;
  blanks.forEach((b,i)=>{

    setTimeout(()=>openLevel(levelId),800);

    result.textContent='❌ Not quite right. Check the highlighted fields.';

// True/False Rapid Fire
function renderTrueFalse(c, levelId, color){
  let html='<div id="tf-container">';
  c.statements.forEach((s,i)=>{
    html+=`<div class="tf-question" id="tf-q-${i}">
      <div class="tf-text">${s.text}</div>
      <div class="tf-buttons">
        <button class="tf-btn true-btn" onclick="answerTF(${i},true,'${levelId}')">True</button>
        <button class="tf-btn false-btn" onclick="answerTF(${i},false,'${levelId}')">False</button>
      </div>
    </div>`;
  });
  html+='</div>';
  return html;
}
let tfScore=0, tfTotal=0, tfAnswered=0;
function answerTF(idx, answer, levelId){
  const zone=getZoneForLevel(levelId);
  const level=zone.levels.find(l=>l.id===levelId);
  const stmt=level.challenge.statements[idx];
  const q=document.getElementById('tf-q-'+idx);
  if(q.classList.contains('answered')) return;
  q.classList.add('answered');
  const btns=q.querySelectorAll('.tf-btn');
  const correct=answer===stmt.answer;
  btns.forEach(b=>{
    if(b.classList.contains('true-btn')&&answer===true) b.classList.add(correct?'chosen-correct':'chosen-wrong');
    if(b.classList.contains('false-btn')&&answer===false) b.classList.add(correct?'chosen-correct':'chosen-wrong');
    b.disabled=true;
  });
  if(correct){tfScore++;playSound('xp');}else{playSound('wrong');}
  tfAnswered++;
  tfTotal=level.challenge.statements.length;
  if(tfAnswered>=tfTotal){
    const result=document.getElementById('challenge-result');
    if(tfScore>=Math.ceil(tfTotal*0.6)){
      result.className='challenge-result success';
      result.textContent=`🎉 ${tfScore}/${tfTotal} correct! Nice rapid fire!`;
      playSound('success');
    } else {
      result.className='challenge-result fail';
      result.textContent=`❌ ${tfScore}/${tfTotal} correct. Keep learning!`;
    }
    if(!state.quizResults[levelId]) state.quizResults[levelId]={passed:true,perfect:tfScore===tfTotal,attempts:1};
    completeLevel(levelId);
    setTimeout(()=>openLevel(levelId),1000);
    saveState();
    tfScore=0;tfAnswered=0;
  }
}

      <div class="badge-name">${z.badge.name}</div>
      <div class="badge-desc">${earned?z.badge.desc:'Complete Zone '+z.id}</div>
    </div>`;
  });

  // Special badges
  SPECIAL_BADGES.forEach(b=>{
    const earned=state.badges.includes(b.id);
    html+=`<div class="badge-card ${earned?'earned':'locked'}">
      <span class="badge-icon">${earned?b.icon:'❓'}</span>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${earned?b.desc:'Keep playing to unlock'}</div>
    </div>`;
  });

  html+=`</div>`;
  document.getElementById('trophy-view').innerHTML=html;
}

// ===== CONFETTI =====
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const particles=[];
  const colors=['#FFD700','#00F0FF','#BF00FF','#39FF14','#FF1493','#FF6B00','#FF2D55','#0080FF'];
  for(let i=0;i<120;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      w:Math.random()*8+4,
      h:Math.random()*6+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*3,
      vy:Math.random()*3+2,
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*10
    });
  }
  let frame=0;
  function animate(){
    if(frame>180){ctx.clearRect(0,0,canvas.width,canvas.height);return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vy+=0.05;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=Math.max(0,1-(frame/180));
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    requestAnimationFrame(animate);
  }
  animate();
}
